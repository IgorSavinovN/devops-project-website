{% extends "layout.html" %}

{% block title %}Календарь и таймер{% endblock %}

{% block content %}
<h1>Календарь и таймер</h1>

<div class="timer-box">
    <h3>Выберите дату и время</h3>
    <label>Дата:
        <input type="date" id="datePicker">
    </label>
    <label>Время:
        <input type="time" id="timePicker">
    </label>
    <button onclick="startTimer()">Запустить таймер</button>
</div>

<div id="timerDisplay" style="font-size: 24px; font-weight: bold; margin: 20px 0;"></div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()">&times;</span>
        <h3>⏰ Таймер сработал!</h3>
        <p id="modalMessage">Выбранное время наступило</p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<script>
let timerInterval;

function startTimer() {
    const date = document.getElementById('datePicker').value;
    const time = document.getElementById('timePicker').value;

    if (!date || !time) { alert('Пожалуйста, выберите дату и время'); return; }

    const selectedDateTime = new Date(date + 'T' + time);
    const now = new Date();

    if (selectedDateTime <= now) { alert('Пожалуйста, выберите будущее время'); return; }

    const timeDiff = selectedDateTime - now;
    const hours = Math.floor(timeDiff / (1000 * 60 * 60));
    const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

    document.getElementById('timerDisplay').innerHTML =
        `Таймер запущен до ${selectedDateTime.toLocaleString()}<br>` +
        `Осталось: ${hours}ч ${minutes}м ${seconds}с`;

    if (timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        const now = new Date();
        const remaining = selectedDateTime - now;

        if (remaining <= 0) {
            clearInterval(timerInterval);
            document.getElementById('timerDisplay').innerHTML = '';
            showModal();
            return;
        }

        const hours = Math.floor(remaining / (1000 * 60 * 60));
        const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((remaining % (1000 * 60)) / 1000);

        document.getElementById('timerDisplay').innerHTML =
            `Таймер запущен до ${selectedDateTime.toLocaleString()}<br>` +
            `Осталось: ${hours}ч ${minutes}м ${seconds}с`;
    }, 1000);
}

function showModal() { document.getElementById('myModal').style.display = 'block'; }
function closeModal() { document.getElementById('myModal').style.display = 'none'; }
window.onclick = function(event) { if(event.target==document.getElementById('myModal')) closeModal(); }
</script>
{% endblock %}
